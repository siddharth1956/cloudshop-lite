apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudshop-api
  labels:
    app: cloudshop-api
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: {{ .Values.replicaCount.api }}
  selector:
    matchLabels:
      app: cloudshop-api
  template:
    metadata:
      labels:
        app: cloudshop-api
    spec:
      containers:
      - name: api
        image: "{{ .Values.image.registry }}/{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.api.targetPort }}
        env:
        - name: REDIS_URL
          value: "redis://redis:{{ .Values.redis.port }}"
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: cloudshop-config
              key: NODE_ENV
        resources:
          {{- toYaml .Values.resources.api | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.service.api.targetPort }}
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.service.api.targetPort }}
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cloudshop-api
  labels:
    app: cloudshop-api
spec:
  selector:
    app: cloudshop-api
  ports:
  - port: {{ .Values.service.api.port }}
    targetPort: {{ .Values.service.api.targetPort }}
