{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudshop-ingress
  labels:
    app: cloudshop
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cloudshop-frontend
            port:
              number: {{ .Values.service.frontend.port }}
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: cloudshop-api
            port:
              number: {{ .Values.service.api.port }}
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: cloudshop-api
            port:
              number: {{ .Values.service.api.port }}
{{- end }}
